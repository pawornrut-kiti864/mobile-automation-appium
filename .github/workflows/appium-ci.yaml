name: Mobile QA - Enterprise Stable CI

on:
  push:
    branches: [main, develop]
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: '0 4 * * *'


jobs:

# =========================
# 🟢 SMOKE TEST
# =========================
  smoke-test:
    runs-on: ubuntu-22.04

    steps:
    - uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: '18'

    - name: Install Dependencies (LOCKED)
      run: |
        pip install robotframework==7.0
        pip install robotframework-appiumlibrary==2.0.0
        pip install robotframework-pabot==5.2.2

        npm install -g appium@2.19.0
        appium driver install uiautomator2@2.30.0

    # =========================
    # 📱 EMULATOR + APP + APPIUM (STABLE ORDER)
    # =========================
    - name: Run Smoke Test
      uses: reactivecircus/android-emulator-runner@v2
      with:
        api-level: 30
        target: google_apis
        arch: x86_64
        profile: Nexus 5

        emulator-options: >
          -no-window
          -no-audio
          -gpu swiftshader_indirect
          -no-snapshot
          -no-boot-anim
          -accel off
          -wipe-data

        disable-animations: true
        emulator-boot-timeout: 600

        script: |

          echo "=============================="
          echo "📱 WAIT EMULATOR ONLINE"
          echo "=============================="

          adb start-server

          for i in {1..60}; do
            adb devices | grep -w "device" | grep -v offline && break
            sleep 3
          done

          for i in {1..80}; do
            boot=$(adb shell getprop sys.boot_completed 2>/dev/null | tr -d '\r')
            if [ "$boot" = "1" ]; then
              echo "✅ EMULATOR READY"
              break
            fi
            sleep 5
          done

          echo "=============================="
          echo "🚀 START APPIUM"
          echo "=============================="

          nohup appium -p 4723 --log appium.log > appium_out.log 2>&1 &

          for i in {1..40}; do
            STATUS=$(curl -s http://127.0.0.1:4723/status | grep '"ready":true')
            if [ ! -z "$STATUS" ]; then
              echo "✅ APPIUM READY"
              break
            fi
            sleep 3
          done

          mkdir -p results/smoke

          echo "=============================="
          echo "🧪 RUN SMOKE TEST"
          echo "=============================="

          robot \
            --loglevel INFO \
            --outputdir results/smoke \
            -i smoke \
            tests/


    - name: Upload Smoke Report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: smoke-report
        path: results/smoke

    - name: Upload Appium Log
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: appium-log
        path: appium.log


# =========================
# 🟡 REGRESSION TEST
# =========================
  regression-test:
    needs: smoke-test   # ✅ FIXED (critical)
    runs-on: ubuntu-22.04

    steps:
    - uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: '18'

    - name: Install Dependencies (LOCKED)
      run: |
        pip install robotframework==7.0
        pip install robotframework-appiumlibrary==2.0.0
        pip install robotframework-pabot==5.2.2

        npm install -g appium@2.19.0
        appium driver install uiautomator2@2.30.0

    - name: Run Regression Test
      uses: reactivecircus/android-emulator-runner@v2
      with:
        api-level: 30
        target: google_apis
        arch: x86_64
        profile: Nexus 5

        emulator-options: >
          -no-window
          -no-audio
          -gpu swiftshader_indirect
          -no-snapshot
          -no-boot-anim
          -accel off
          -wipe-data

        disable-animations: true
        emulator-boot-timeout: 600

        script: |

          echo "📱 WAIT EMULATOR"
          adb start-server

          for i in {1..60}; do
            adb devices | grep -w "device" | grep -v offline && break
            sleep 3
          done

          for i in {1..80}; do
            boot=$(adb shell getprop sys.boot_completed 2>/dev/null | tr -d '\r')
            [ "$boot" = "1" ] && break
            sleep 5
          done

          echo "🚀 START APPIUM"
          nohup appium -p 4723 --log appium.log > appium_out.log 2>&1 &

          for i in {1..40}; do
            curl -s http://127.0.0.1:4723/status | grep '"ready":true' && break
            sleep 3
          done

          mkdir -p results/regression

          echo "🧪 RUN REGRESSION"
          pabot \
            --processes 2 \
            --loglevel INFO \
            -i regression \
            -d results/regression \
            tests/


    - name: Upload Regression Report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: regression-report
        path: results/regression