name: Appium Mobile Tests (No Docker)

on:
  push:
    branches: [ main ]
  workflow_dispatch:
  schedule: 
    - cron: '0 4 * * *'

jobs:
  test:
    runs-on: ubuntu-22.04

    steps:
    - uses: actions/checkout@v4

    # 🔒 Java (จำเป็นสำหรับ Android)
    - uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: '17'

    # 🔒 Python
    - uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'

    # 🔒 Node
    - uses: actions/setup-node@v4
      with:
        node-version: '18'

    # 🔒 Install dependencies
    - name: Install dependencies
      run: |
        pip install -r requirements.txt
        npm install -g appium@2.19.0
        appium driver install uiautomator2@2.30.0

    # 📱 Start Emulator + Run Test
    - name: Run Emulator + Tests
      uses: reactivecircus/android-emulator-runner@v2
      with:
        api-level: 29
        target: google_apis
        arch: x86_64
        profile: Nexus 6
        emulator-options: -no-window -no-audio -gpu swiftshader_indirect
        disable-animations: true
        script: |
          echo "🚀 Start Appium"
          nohup appium -p 4723 > appium.log 2>&1 &
          sleep 10

          echo "📱 Check device"
          adb devices

          echo "🧪 Run tests"
          robot -d results tests/

    # 📦 Upload results
    - uses: actions/upload-artifact@v4
      with:
        name: results
        path: results/