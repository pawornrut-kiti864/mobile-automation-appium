name: Mobile QA - Enterprise Resilient

on:
  push:
    branches: [main, develop]
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: '0 4 * * *'


# =========================
# 🧠 GLOBAL ENV (reuse idea)
# =========================
env:
  APPIUM_PORT: 4723


jobs:

# =========================
# 🟢 SMOKE STAGE
# =========================
  smoke-test:
    runs-on: ubuntu-22.04

    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - uses: actions/setup-node@v4
      with:
        node-version: '18'

    # =========================
    # 🔒 LOCKED INSTALL
    # =========================
    - name: Install dependencies
      run: |
        pip install robotframework==7.0
        pip install robotframework-appiumlibrary==2.0.0
        pip install robotframework-pabot==5.2.2

        npm install -g appium@2.19.0
        appium driver install uiautomator2@2.30.0

    # =========================
    # 📱 EMULATOR + SAFE BOOT
    # =========================
    - name: Smoke Test
      uses: reactivecircus/android-emulator-runner@v2
      with:
        api-level: 30
        target: google_apis
        arch: x86_64
        profile: Nexus 5

        emulator-options: >
          -wipe-data
          -no-window
          -no-audio
          -gpu swiftshader_indirect
          -no-snapshot
          -no-boot-anim
          -accel off

        disable-animations: true
        emulator-boot-timeout: 900

        script: |

          echo "===================="
          echo "ADB SAFE INIT"
          echo "===================="

          adb kill-server
          adb start-server

          # wait device ONLINE (robust)
          for i in {1..40}; do
            if adb devices | grep -w "device" | grep -v "offline"; then
              echo "DEVICE ONLINE"
              break
            fi
            sleep 3
          done

          echo "===================="
          echo "BOOT CHECK"
          echo "===================="

          for i in {1..80}; do
            BOOT=$(adb shell getprop sys.boot_completed 2>/dev/null | tr -d '\r')
            if [ "$BOOT" = "1" ]; then
              echo "BOOT COMPLETE"
              break
            fi
            sleep 5
          done

          echo "===================="
          echo "START APPIUM SAFE"
          echo "===================="

          # clean port
          lsof -ti:${APPIUM_PORT} | xargs kill -9 || true

          nohup appium -p ${APPIUM_PORT} --log appium.log > appium_out.log 2>&1 &

          # Appium health gate
          for i in {1..40}; do
            STATUS=$(curl -s http://127.0.0.1:${APPIUM_PORT}/status | grep -o '"ready":[ ]*true' || true)
            if [ ! -z "$STATUS" ]; then
              echo "APPIUM READY"
              break
            fi
            sleep 3
          done

          echo "===================="
          echo "RUN SMOKE"
          echo "===================="

          mkdir -p results/smoke

          robot \
            --loglevel INFO \
            --outputdir results/smoke \
            -i smoke \
            tests/

    # =========================
    # 📦 ARTIFACTS
    # =========================
    - name: Upload Smoke Report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: smoke-report
        path: results/smoke

    - name: Upload Logs
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: appium-log
        path: appium.log


# =========================
# 🟡 REGRESSION STAGE
# =========================
  regression-test:
    needs: smoke
    runs-on: ubuntu-22.04

    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - uses: actions/setup-node@v4
      with:
        node-version: '18'

    - name: Install dependencies
      run: |
        pip install robotframework==7.0
        pip install robotframework-appiumlibrary==2.0.0
        pip install robotframework-pabot==5.2.2

        npm install -g appium@2.19.0
        appium driver install uiautomator2@2.30.0

    - name: Regression Test
      uses: reactivecircus/android-emulator-runner@v2
      with:
        api-level: 30
        target: google_apis
        arch: x86_64
        profile: Nexus 5

        emulator-options: >
          -wipe-data
          -no-window
          -no-audio
          -gpu swiftshader_indirect
          -no-snapshot
          -no-boot-anim
          -accel off

        disable-animations: true
        emulator-boot-timeout: 900

        script: |

          adb kill-server
          adb start-server

          for i in {1..40}; do
            adb devices | grep -w "device" && break
            sleep 3
          done

          for i in {1..80}; do
            BOOT=$(adb shell getprop sys.boot_completed 2>/dev/null | tr -d '\r')
            [ "$BOOT" = "1" ] && break
            sleep 5
          done

          lsof -ti:${APPIUM_PORT} | xargs kill -9 || true

          nohup appium -p ${APPIUM_PORT} --log appium.log > appium_out.log 2>&1 &

          for i in {1..40}; do
            curl -s http://127.0.0.1:${APPIUM_PORT}/status | grep -q '"ready": true' && break
            sleep 3
          done

          mkdir -p results/regression

          pabot \
            --processes 2 \
            --rerunfailed results/regression/output.xml \
            -i regression \
            -d results/regression \
            tests/

    - name: Upload Regression Report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: regression-report
        path: results/regression