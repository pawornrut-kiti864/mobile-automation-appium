name: Appium Mobile Tests (Stable)

on:
  push:
    branches: [ main, develop ]
  workflow_dispatch:
  schedule:
    - cron: '0 4 * * *'

jobs:
  test:
    runs-on: ubuntu-22.04   # lock OS

    steps:
    - uses: actions/checkout@v4

    # 🔒 Java
    - uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: '17'

    # 🔒 Node
    - uses: actions/setup-node@v4
      with:
        node-version: '18'

    # 🔒 Python
    - uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'

    # 🔒 Install dependencies
    - name: Install dependencies
      run: |
        pip install -r requirements.txt

        npm install -g appium@2.19.0
        appium driver install uiautomator2@2.30.0

        appium -v
        appium driver list

    # 🔒 Emulator + Test
    - name: Run Emulator + Tests
      uses: reactivecircus/android-emulator-runner@v2
      with:
        api-level: 30
        target: default
        arch: x86_64
        profile: pixel_4
        emulator-options: -no-window -no-audio -gpu swiftshader_indirect
        disable-animations: true
        script: |
          echo "✅ Emulator started"
          adb devices

          # 🔒 wait boot complete
          adb wait-for-device
          adb shell 'while [[ -z $(getprop sys.boot_completed) ]]; do sleep 1; done;'

          # 🔒 Start Appium
          nohup appium -p 4723 > appium.log 2>&1 &
          sleep 15

          curl http://127.0.0.1:4723/status || true

          # 🔒 Run Robot
          robot -d results tests/

    # 🔒 Upload result
    - uses: actions/upload-artifact@v4
      with:
        name: robot-results
        path: results/

    # 🔒 Upload logs (debug)
    - uses: actions/upload-artifact@v4
      with:
        name: appium-log
        path: appium.log