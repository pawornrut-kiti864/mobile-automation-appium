name: Appium Mobile Tests
on:
  push:
    branches: [ main ]
  workflow_dispatch:
  schedule: 
    - cron: '0 4 * * *'

jobs:

  setup:
    runs-on: ubuntu-22.04
    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: '17'

    - uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'

    - uses: actions/setup-node@v4
      with:
        node-version: '18'

    - name: Install deps
      run: |
        pip install -r requirements.txt
        npm install -g appium@2.19.0
        appium driver install uiautomator2@2.30.0


  smoke-test:
    needs: setup
    runs-on: ubuntu-22.04

    steps:
    - uses: actions/checkout@v4

    - name: Run Smoke
      uses: reactivecircus/android-emulator-runner@v2
      with:
        api-level: 29
        target: google_apis
        arch: x86_64
        profile: Nexus 6
        emulator-options: -no-window -no-audio -gpu swiftshader_indirect
        disable-animations: true
        script: |
          nohup appium -p 4723 > appium.log 2>&1 &
          sleep 10
          robot -i smoke -d results/smoke tests/

    - name: Upload Smoke Report
      uses: actions/upload-artifact@v4
      with:
        name: smoke-report
        path: results/smoke

    - name: Summary Smoke
      run: |
        echo "## Smoke Test Result" >> $GITHUB_STEP_SUMMARY
        echo "Artifact: smoke-report" >> $GITHUB_STEP_SUMMARY
        echo "Open report.html in artifact" >> $GITHUB_STEP_SUMMARY


  regression-test:
    needs: smoke-test
    runs-on: ubuntu-22.04

    steps:
    - uses: actions/checkout@v4

    - name: Run Regression
      uses: reactivecircus/android-emulator-runner@v2
      with:
        api-level: 29
        target: google_apis
        arch: x86_64
        profile: Nexus 6
        emulator-options: -no-window -no-audio -gpu swiftshader_indirect
        disable-animations: true
        script: |
          nohup appium -p 4723 > appium.log 2>&1 &
          sleep 10
          robot -i regression -d results/regression tests/

    - name: Upload Regression Report
      uses: actions/upload-artifact@v4
      with:
        name: regression-report
        path: results/regression

    - name: Summary Regression
      run: |
        echo "## Regression Test Result" >> $GITHUB_STEP_SUMMARY
        echo "Artifact: regression-report" >> $GITHUB_STEP_SUMMARY
        echo "Open report.html in artifact" >> $GITHUB_STEP_SUMMARY