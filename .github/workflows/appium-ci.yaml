name: Appium Mobile Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:
  schedule: 
    - cron: '0 4 * * *'

jobs:

  smoke-test:
    runs-on: ubuntu-22.04
    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - uses: actions/setup-node@v4
      with:
        node-version: '18'

    - name: Install dependencies
      run: |
        pip install -r requirements.txt
        pip install robotframework-pabot
        npm install -g appium@2.19.0
        appium driver install uiautomator2@2.30.0

    - name: Smoke Test
      uses: reactivecircus/android-emulator-runner@v2
      with:
        api-level: 30
        target: google_apis
        arch: x86_64
        profile: Nexus 5
        emulator-options: >
          -no-window -no-audio -gpu swiftshader_indirect
          -no-boot-anim -no-snapshot -accel off
        disable-animations: true
        boot-timeout: 300

        script: |
          nohup appium -p 4723 > appium.log 2>&1 &

          adb wait-for-device
          until adb shell getprop sys.boot_completed | grep -m 1 '1'; do
            sleep 2
          done

          pabot --processes 3 -i smoke -d results/smoke tests/

    - name: Upload Smoke Report
      uses: actions/upload-artifact@v4
      with:
        name: smoke-report
        path: results/smoke


  regression-test:
    needs: smoke-test
    runs-on: ubuntu-22.04

    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - uses: actions/setup-node@v4
      with:
        node-version: '18'

    - name: Install dependencies
      run: |
        pip install -r requirements.txt
        pip install robotframework-pabot
        npm install -g appium@2.19.0
        appium driver install uiautomator2@2.30.0

    - name: Regression Test
      uses: reactivecircus/android-emulator-runner@v2
      with:
        api-level: 30
        target: google_apis
        arch: x86_64
        profile: Nexus 5
        emulator-options: >
          -no-window -no-audio -gpu swiftshader_indirect
          -no-boot-anim -no-snapshot -accel off
        disable-animations: true
        boot-timeout: 600

        script: |
          nohup appium -p 4723 > appium.log 2>&1 &

          adb wait-for-device
          until adb shell getprop sys.boot_completed | grep -m 1 '1'; do
            sleep 2
          done

          pabot --processes 2 -i regression -d results/regression tests/

    - name: Upload Regression Report
      uses: actions/upload-artifact@v4
      with:
        name: regression-report
        path: results/regression