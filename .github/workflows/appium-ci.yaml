name: Appium Stable CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:
  schedule:
    - cron: '0 4 * * *'

jobs:

  test:
    runs-on: ubuntu-22.04

    steps:
    - uses: actions/checkout@v4

    # 🐍 Python
    - uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    # 🟢 Node
    - uses: actions/setup-node@v4
      with:
        node-version: '18'

    # 🔧 Install tools (FIXED + STABLE)
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install robotframework robotframework-pabot

        npm install -g appium@2.19.0
        appium driver install uiautomator2@2.30.0

        robot --version
        pabot --version

    # 📱 Emulator + Test
    - name: Run Emulator & Tests
      uses: reactivecircus/android-emulator-runner@v2
      with:
        api-level: 30
        target: google_apis
        arch: x86_64
        profile: Nexus 5

        emulator-options: >
          -no-window -no-audio -gpu swiftshader_indirect
          -no-boot-anim -no-snapshot -accel off

        disable-animations: true
        boot-timeout: 600

        script: |

          echo "🚀 Starting Appium"
          nohup appium -p 4723 --log appium.log > appium_out.log 2>&1 &

          echo "⏳ Waiting Appium"
          for i in {1..30}; do
            curl -s http://127.0.0.1:4723/status && break
            sleep 3
          done

          echo "📱 Waiting Emulator Boot"
          for i in {1..60}; do
            boot=$(adb shell getprop sys.boot_completed 2>/dev/null | tr -d '\r')
            if [ "$boot" = "1" ]; then
              echo "✅ Emulator Ready"
              break
            fi
            sleep 5
          done

          echo "📲 Device check"
          adb devices

          echo "🧪 Running Tests"
          pabot \
            --processes 2 \
            --loglevel DEBUG \
            -i smoke \
            -d results/smoke \
            tests/

    # 📦 Reports
    - name: Upload Smoke Report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: smoke-report
        path: results/smoke

    - name: Upload Appium Log
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: appium-log
        path: appium.log