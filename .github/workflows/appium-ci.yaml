name: Appium Mobile Tests (Docker)

on:
  push:
    branches: [ main ]
  workflow_dispatch:
  schedule: 
    - cron: '0 4 * * *'

jobs:
  test:
    runs-on: ubuntu-22.04

    steps:
    - uses: actions/checkout@v4

    # 🔒 Python
    - uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'

    # 🔒 Node
    - uses: actions/setup-node@v4
      with:
        node-version: '18'

    # 🔒 Install deps
    - name: Install dependencies
      run: |
        pip install -r requirements.txt
        npm install -g appium@2.19.0

    # 🐳 Start Android Emulator Container
    - name: Start Docker Emulator
      run: |
        docker run -d \
          -p 6080:6080 \
          -p 4723:4723 \
          --name android \
          budtmo/docker-android-x86-11.0

        echo "⏳ Waiting for emulator..."
        sleep 60

    # 🔍 Check emulator
    - name: Check device
      run: |
        adb connect localhost:5555 || true
        adb devices

    # 🚀 Run Robot
    - name: Run Tests
      run: |
        robot -d results tests/

    # 📦 Upload results
    - uses: actions/upload-artifact@v4
      with:
        name: results
        path: results/